<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Collection Lounge Chair | Summit Furniture — Cylindo Demo</title>
  <link rel="preconnect" href="https://content.cylindo.com" crossorigin />
  <script type="module" src="https://viewer-cdn.cylindo.com/v1/index.mjs" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-utility">
      <div class="header-utility-inner">
        <a href="#" class="utility-link">Skip to content</a>
        <a href="#" class="utility-link">Trade Account Login</a>
      </div>
    </div>
    <div class="header-main">
      <div class="header-main-inner">
        <button class="menu-btn" type="button" aria-label="Open menu">Menu</button>
        <a href="#" class="logo" id="logo">SUMMIT</a>
        <div class="account-links">
          <a href="#">Join Our Trade Program</a>
          <a href="#">Login</a>
        </div>
      </div>
    </div>
    <div class="main-nav-wrap">
      <nav class="main-nav" id="main-nav"></nav>
    </div>
  </header>

  <!-- Product Switcher -->
  <div class="product-switcher" id="product-switcher"></div>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <div class="container" id="breadcrumb"></div>
  </div>

  <!-- Main Product Section -->
  <main class="product-section">
    <div class="container product-grid">

      <!-- Left: Cylindo Curator Gallery -->
      <div class="product-media">
        <div class="cylindo-wrapper" id="cylindo-container"></div>
        <button class="tearsheet-btn" id="tearsheet-btn" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
          Download Tear Sheet
        </button>
      </div>

      <!-- Right: Product Info -->
      <div class="product-info" id="product-info"></div>
    </div>
  </main>

  <!-- Specifications -->
  <section class="specs-section">
    <div class="container">
      <div class="specs-grid" id="specs-grid"></div>
    </div>
  </section>

  <!-- Feature Highlights -->
  <section class="features-section">
    <div class="container">
      <div class="features-grid" id="features-grid"></div>
    </div>
  </section>

  <!-- FAQ Section -->
  <section class="faq-section">
    <div class="container">
      <h2 class="section-heading">Questions & Answers</h2>
      <div class="faq-list" id="faq-list"></div>
    </div>
  </section>

  <!-- Cylindo Banner -->
  <section class="cylindo-banner">
    <div class="container">
      <span class="powered-by">3D Product Visualization Powered by</span>
      <span class="cylindo-brand">Cylindo</span>
      <p>Interactive 360° product visualization replacing static photography with an immersive experience.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container footer-grid" id="footer-grid"></div>
    <div class="footer-bottom">
      <p id="footer-copyright"></p>
    </div>
  </footer>

  <!-- Tear Sheet Modal -->
  <div class="tearsheet-overlay" id="tearsheet-overlay">
    <div class="tearsheet-modal">
      <button class="tearsheet-close" id="tearsheet-close" type="button">&times;</button>
      <div class="tearsheet-actions">
        <button class="tearsheet-print-btn" id="tearsheet-print-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print / Save as PDF
        </button>
      </div>
      <div class="tearsheet-content" id="tearsheet-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
